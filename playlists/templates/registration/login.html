
<!DOCTYPE html>
{% load static %}
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Accedi - Il mio Spotify</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-body">

    <div class="login-container">
        <h2 class="login-title">Accedi al tuo account</h2>

        <form method="post" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Inserisci il tuo username" required>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Inserisci la password" required>
            </div>

            <button type="submit" class="btn-login-submit">Entra</button>
        </form>

        <a href="/" class="login-back-link">Torna alla Home</a>
    </div>

</body>
</html>
